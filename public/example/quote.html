<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Widget Test Page</title>
        <style>
            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background-image: url("./sunshine_mills_inc_cover.jpeg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-bottom: 10px;

                background-color: lightgray;
            }

            header {
                background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
                width: 100%;
                color: #ffffff;
                padding: 0;
                margin: 0;
                border-radius: 0;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 1rem 2rem;
            }

            .logo-section {
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .logo {
                width: 50px;
                height: 50px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
                font-weight: bold;
                color: #ffd700;
            }

            .business-name {
                font-size: 2rem;
                font-weight: bold;
                letter-spacing: 0.5px;
            }

            nav {
                display: flex;
                gap: 2rem;
                align-items: center;
            }

            nav a {
                color: #ffffff;
                text-decoration: none;
                font-size: 1rem;
                font-weight: 500;
                transition: color 0.3s ease;
                padding: 0.5rem 1rem;
                border-radius: 4px;
            }

            nav a:hover {
                color: #ffd700;
                background: rgba(255, 255, 255, 0.1);
            }

            nav a.active {
                color: #ffd700;
                border-bottom: 2px solid #ffd700;
            }

            iframe {
                margin-top: 2rem;
                width: 70%;
                max-width: 900px;
                height: 600px;
                border: none;
                border-radius: 16px;
                /* box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); */
                overflow: hidden;
            }

            .n {
                height: 10px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo-section">
                <div class="logo">☀️</div>
                <div class="business-name">Sunnies</div>
            </div>
            <nav>
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#services">Services</a>
                <a href="#quote" class="active">Get Quote</a>
                <a href="#contact">Contact</a>
            </nav>
        </header>

        <iframe
            src="http://localhost:3001?apiKey=client_e162fc91ab79d712ebfa600a7f60235a"
            >"</iframe
        >
    </body>
</html>
